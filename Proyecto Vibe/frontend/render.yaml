# Render Static Site — frontend
# En el dashboard también puedes configurar esto manualmente.
services:
  - type: web
    name: proyecto-vibe-frontend
    runtime: static
    rootDir: Proyecto Vibe/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: PUBLIC_API_URL
        value: https://proyecto-vibe-1.onrender.com/api
    routes:
      - type: rewrite
        source: /sign-up/*
        destination: /sign-up.html
      - type: rewrite
        source: /sign-in/*
        destination: /sign-in.html
